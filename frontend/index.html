
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeriTech Store</title>

    <link rel="stylesheet" href="tp_css.css">
</head>
<body>
    <header class="header-inicio">

        <img src="assets/logo_tp.png" alt="Logo PeriTech" class="logo">

        <div>
            <h1>PeriTech Store</h1>
            <p>Venta de periféricos gamer</p>
            <p class="alumnos">
                Alumnos: Agustin Blanco y Jesus Fernandez
            </p>
        </div>

    </header>

        <section class="bienvenida">

            <h2>Bienvenido</h2>

            <p>Ingrese su nombre para comenzar la compra</p>

            <input
                type="text"
                id="nombre"
                placeholder="Ingrese su nombre">

            <button id="btnContinuar">
                Continuar
            </button>
            <div class="admin-login">

                <p>¿Sos administrador?</p>

                <a
                    href="http://localhost:3000/login"
                    class="btn-admin">

                    🔐 Panel de Administración

                </a>

            </div>

        </section>

    </main>

    <script src="tp_js.js"></script>

</body>
</html>
